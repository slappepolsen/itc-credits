    async function load() {
      try {
        if (location.protocol === "file:") {
          document.getElementById("file-banner").style.display = "block";
        }
        const [castRes, appRes, viewRes] = await Promise.all([
          fetch("data/cast.json"),
          fetch("data/appearances.json"),
          fetch("data/viewership.json"),
        ]);
        if (!castRes.ok || !appRes.ok || !viewRes.ok) throw new Error("Could not load JSON");
        castData = await castRes.json();
        appearanceData = await appRes.json();
        viewershipData = await viewRes.json();
        populateTimelineSelect();
        render();
      } catch (e) {
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        document.getElementById("main").innerHTML = `
          <p class="empty-state">
            Could not load JSON via <code>file://</code>.<br><br>
            <code>python3 -m http.server 8081</code><br>
            then open <code>http://localhost:8081</code>
          </p>`;
        document.getElementById("controls").classList.add("hidden");
      }
    }

    function allEpisodeNumbers() {
      return Object.keys(appearanceData.episodes).map(Number).sort((a, b) => a - b);
    }

    function byCharacterMap() {
      const map = {};
      Object.entries(appearanceData.episodes).forEach(([ep, names]) => {
        names.forEach(name => {
          if (!map[name]) map[name] = [];
          map[name].push(Number(ep));
        });
      });
      Object.values(map).forEach(eps => eps.sort((a, b) => a - b));
      return map;
    }

    function appearanceCounts() {
      const counts = {};
      Object.values(appearanceData.episodes).forEach(names => {
        names.forEach(n => { counts[n] = (counts[n] || 0) + 1; });
      });
      return counts;
    }

    function longestStreak(charEps, allEps) {
      const set = new Set(charEps);
      let best = 0, cur = 0;
      allEps.forEach(ep => {
        if (set.has(ep)) { cur++; best = Math.max(best, cur); }
        else cur = 0;
      });
      return best;
    }

    function analysisWindow(eps, seasonKey) {
      const sel = seasonKey ?? document.getElementById("season-select").value;
      const n = eps.length;
      if (!n) return "No episodes in this range.";
      if (sel === "all") {
        return `Episodes ${eps[0]}-${eps[eps.length - 1]} (${n} episodes).`;
      }
      const s = SEASONS.find(x => x.n === Number(sel));
      if (!s) {
        return `Episodes ${eps[0]}-${eps[eps.length - 1]} (${n} episodes).`;
      }
      return `Season ${s.n}: episodes ${s.start}-${s.end} (${n} episodes).`;
    }

    function trackedSeasonsLabel(eps) {
      if (!eps.length) return "N/A";
      const min = eps[0];
      const max = eps[eps.length - 1];
      const seasons = SEASONS.filter(s => s.start <= max && s.end >= min).map(s => s.n);
      if (!seasons.length) return "N/A";
      if (seasons.length === 1) return String(seasons[0]);
      return `${seasons[0]}-${seasons[seasons.length - 1]}`;
    }

    function filteredEpisodes() {
      const sel = document.getElementById("season-select").value;
      const eps = allEpisodeNumbers();
      if (sel === "all") return eps;
      const s = SEASONS.find(x => x.n === Number(sel));
      if (!s) return eps;
      return eps.filter(ep => ep >= s.start && ep <= s.end);
    }

    function normalizeSearch(s) {
      return s.normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase();
    }

    function query() {
      return normalizeSearch(document.getElementById("search").value.trim());
    }

    function appearanceCountsForEpisodes(eps) {
      const counts = {};
      eps.forEach(ep => {
        (appearanceData.episodes[String(ep)] || []).forEach(name => {
          counts[name] = (counts[name] || 0) + 1;
        });
      });
      return counts;
    }

    function coFirstName(name) {
      return name.trim().split(/\s+/)[0];
    }

    function characterColor(name) {
      if (CHARACTER_COLORS[name]) return CHARACTER_COLORS[name];
      const season = CHARACTER_SEASONS[name];
      return season ? SEASON_CHART_COLORS[season] : null;
    }

    function nameHtml(name, { firstOnly = false } = {}) {
      if (!name || name === "-") return escapeHtml(name);
      const label = firstOnly ? coFirstName(name) : name;
      const color = characterColor(name);
      if (!color) return escapeHtml(label);
      return `<span class="char-name" style="color:${color}">${escapeHtml(label)}</span>`;
    }

    const coV2 = { pinned: null, data: null, order: [], bound: false };

    const CO2_PALETTE = [
      "#FBF7F0", "#F6E7D8", "#EFD2B6", "#E4B98F", "#D59768",
      "#C2764B", "#A8583C", "#833C39", "#5C2430"
    ];
    const CO2_PIN_COLOR = "#5C2430";

    function coV2PaletteColor(t) {
      const palette = CO2_PALETTE;
      const n = palette.length - 1;
      const pos = t * n;
      const i = Math.min(Math.floor(pos), n - 1);
      const f = pos - i;
      const parse = h => {
        const x = parseInt(h.slice(1), 16);
        return [x >> 16, (x >> 8) & 255, x & 255];
      };
      const c1 = parse(palette[i]);
      const c2 = parse(palette[i + 1]);
      const [r, g, b] = c1.map((v, k) => Math.round(v + (c2[k] - v) * f));
      return `rgb(${r},${g},${b})`;
    }

    function buildCoV2Data(eps) {
      const episodeIds = eps.map(String);
      const totals = new Map();

      episodeIds.forEach((epId) => {
        (appearanceData.episodes[epId] || []).forEach(name => {
          totals.set(name, (totals.get(name) || 0) + 1);
        });
      });

      const allChars = Array.from(totals.keys());
      const idxOf = new Map(allChars.map((c, i) => [c, i]));
      const n = allChars.length;
      const co = Array.from({ length: n }, () => new Uint16Array(n));

      episodeIds.forEach(epId => {
        const cast = appearanceData.episodes[epId] || [];
        for (let i = 0; i < cast.length; i++) {
          const a = idxOf.get(cast[i]);
          co[a][a]++;
          for (let j = i + 1; j < cast.length; j++) {
            const b = idxOf.get(cast[j]);
            co[a][b]++;
            co[b][a]++;
          }
        }
      });

      let maxCo = 0;
      for (let i = 0; i < n; i++) {
        for (let j = 0; j < n; j++) {
          if (i !== j) maxCo = Math.max(maxCo, co[i][j]);
        }
      }

      const sharedTotals = new Map();
      for (let i = 0; i < n; i++) {
        let total = 0;
        for (let j = 0; j < n; j++) {
          if (i !== j) total += co[i][j];
        }
        sharedTotals.set(allChars[i], total);
      }

      return { episodeIds, totals, sharedTotals, allChars, idxOf, co, maxCo };
    }

    function coV2LabelColor() {
      return "#24211d";
    }

    function coV2HighlightSet() {
      const set = new Set();
      if (coV2.pinned) set.add(coV2.pinned);
      return set;
    }

    function coV2ComputeOrder() {
      const d = coV2.data;
      if (!d) return [];
      let list = d.allChars.slice();
      const mode = document.getElementById("co2-sortMode").value;
      if (mode === "total_desc") {
        list.sort((a, b) => d.totals.get(b) - d.totals.get(a) || a.localeCompare(b, "fr"));
      } else if (mode === "strength_desc") {
        list.sort((a, b) => d.sharedTotals.get(b) - d.sharedTotals.get(a) || a.localeCompare(b, "fr"));
      } else if (mode === "alpha") {
        list.sort((a, b) => a.localeCompare(b, "fr"));
      }

      const topN = parseInt(document.getElementById("co2-topN").value, 10);
      list = list.slice(0, topN);

      // Typing a name highlights everyone it matches against the full grid,
      // rather than shrinking the grid down to just the matches, so a search
      // always answers "who does this person co-occur with" consistently.
      coV2HighlightSet().forEach(name => {
        if (!list.includes(name)) list.unshift(name);
      });
      return list;
    }

    function coV2CellValue(a, b, useNorm) {
      const d = coV2.data;
      if (a === b) return null;
      const raw = d.co[d.idxOf.get(a)][d.idxOf.get(b)];
      if (!useNorm) return raw;
      const denom = Math.min(d.totals.get(a), d.totals.get(b));
      return denom ? raw / denom : 0;
    }

    function coV2ColorFor(v, useNorm, localMax) {
      if (v === null) return "#e5e5e5";
      const t = useNorm ? Math.min(1, v) : Math.min(1, v / (localMax || 1));
      return coV2PaletteColor(t);
    }

    function drawCoV2() {
      const canvas = document.getElementById("co2-canvas");
      if (!canvas || !coV2.data) return;
      const ctx = canvas.getContext("2d");
      const d = coV2.data;
      const useNorm = document.getElementById("co2-normToggle").checked;

      coV2.order = coV2ComputeOrder();
      const highlightSet = coV2HighlightSet();
      const m = coV2.order.length;

      let localMax = 0;
      for (let i = 0; i < m; i++) {
        for (let j = 0; j < m; j++) {
          if (i === j) continue;
          const v = coV2CellValue(coV2.order[i], coV2.order[j], false);
          if (v > localMax) localMax = v;
        }
      }

      document.getElementById("co2-legendMax").textContent =
        useNorm ? "100%" : String(localMax || d.maxCo);

      const LABEL_W = 190;
      const LABEL_H = 150;
      const CELL = m > 60 ? 14 : m > 40 ? 18 : 24;
      const W = LABEL_W + m * CELL + 10;
      const H = LABEL_H + m * CELL + 10;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, W, H);
      ctx.font = "11px ui-monospace, monospace";
      ctx.textBaseline = "middle";

      for (let j = 0; j < m; j++) {
        const x = LABEL_W + j * CELL + CELL / 2;
        const name = coV2.order[j];
        ctx.save();
        ctx.translate(x, LABEL_H - 6);
        ctx.rotate(-Math.PI / 2.4);
        ctx.textAlign = "left";
        ctx.fillStyle = coV2LabelColor(name, highlightSet);
        ctx.font = highlightSet.has(name)
          ? "bold 11px ui-monospace, monospace"
          : "11px ui-monospace, monospace";
        ctx.fillText(coFirstName(name), 0, 0);
        ctx.restore();
      }

      ctx.textAlign = "right";
      for (let i = 0; i < m; i++) {
        const y = LABEL_H + i * CELL + CELL / 2;
        const name = coV2.order[i];
        ctx.fillStyle = coV2LabelColor(name, highlightSet);
        ctx.font = highlightSet.has(name)
          ? "bold 11px ui-monospace, monospace"
          : "11px ui-monospace, monospace";
        ctx.fillText(coFirstName(name), LABEL_W - 8, y);
      }

      for (let i = 0; i < m; i++) {
        for (let j = 0; j < m; j++) {
          const x = LABEL_W + j * CELL;
          const y = LABEL_H + i * CELL;
          const v = coV2CellValue(coV2.order[i], coV2.order[j], useNorm);
          ctx.fillStyle = coV2ColorFor(v, useNorm, localMax);
          ctx.fillRect(x, y, CELL - 1, CELL - 1);
          if ((highlightSet.has(coV2.order[i]) || highlightSet.has(coV2.order[j]))
            && coV2.order[i] !== coV2.order[j]) {
            ctx.strokeStyle = CO2_PIN_COLOR;
            ctx.lineWidth = 1;
            ctx.strokeRect(x + 0.5, y + 0.5, CELL - 2, CELL - 2);
          }
        }
      }
    }

    function coV2CellAt(px, py) {
      const m = coV2.order.length;
      const LABEL_W = 190;
      const LABEL_H = 150;
      const CELL = m > 60 ? 14 : m > 40 ? 18 : 24;
      const j = Math.floor((px - LABEL_W) / CELL);
      const i = Math.floor((py - LABEL_H) / CELL);
      if (i < 0 || j < 0 || i >= m || j >= m) return null;
      return { i, j };
    }

    function coV2UpdateSelectedInfo() {
      const el = document.getElementById("co2-selectedInfo");
      if (!el) return;
      if (!coV2.pinned) {
        el.innerHTML = "";
        return;
      }
      const total = coV2.data.totals.get(coV2.pinned);
      el.innerHTML = `Pinned: <span class="co2-selected-tag">${escapeHtml(coV2.pinned)} (${total} ep.) <button type="button" id="co2-unpin">x</button></span>`;
      document.getElementById("co2-unpin").onclick = () => {
        coV2.pinned = null;
        coV2UpdateSelectedInfo();
        drawCoV2();
      };
    }

    function buildCoV2PairsTables() {
      const d = coV2.data;
      if (!d) return;
      const pairs = [];
      for (let i = 0; i < d.allChars.length; i++) {
        for (let j = i + 1; j < d.allChars.length; j++) {
          const v = d.co[i][j];
          if (v > 0) pairs.push([d.allChars[i], d.allChars[j], v]);
        }
      }
      pairs.sort((a, b) => b[2] - a[2]);
      const top = pairs.slice(0, 40);
      const countEl = document.getElementById("co2-topPairsCount");
      if (countEl) {
        countEl.textContent = `(${top.length} shown of ${pairs.length} pairs)`;
      }
      const half = Math.ceil(top.length / 2);
      coV2FillPairsTable("co2-pairsTableA", top.slice(0, half), 1);
      coV2FillPairsTable("co2-pairsTableB", top.slice(half), half + 1);
    }

    function coV2FillPairsTable(id, rows, startIdx) {
      const tbody = document.querySelector(`#${id} tbody`);
      if (!tbody) return;
      tbody.innerHTML = rows.map((r, i) =>
        `<tr><td>${startIdx + i}</td><td>${nameHtml(r[0])} + ${nameHtml(r[1])}</td><td class="n">${r[2]}</td></tr>`
      ).join("");
    }

    function coV2SyncTopNLock() {
      const topN = document.getElementById("co2-topN");
      const topNVal = document.getElementById("co2-topNVal");
      const mode = document.getElementById("co2-sortMode").value;
      if (mode === "alpha") {
        // A-Z browsing should show every character, a "top N by appearances"
        // cutoff would just punch random holes in the alphabet.
        if (!topN.disabled) topN.dataset.prevValue = topN.value;
        topN.disabled = true;
        topN.value = topN.max;
      } else if (topN.disabled) {
        topN.disabled = false;
        topN.value = topN.dataset.prevValue || topN.value;
      }
      topNVal.textContent = topN.value;
    }

    function bindCoV2Events() {
      const canvas = document.getElementById("co2-canvas");
      const tooltip = document.getElementById("app-tooltip");
      if (!canvas || canvas.dataset.bound) return;
      canvas.dataset.bound = "1";

      canvas.addEventListener("mousemove", e => {
        const rect = canvas.getBoundingClientRect();
        const px = e.clientX - rect.left;
        const py = e.clientY - rect.top;
        const hit = coV2CellAt(px, py);
        if (!hit || hit.i === hit.j) {
          tooltip.style.display = "none";
          return;
        }
        const a = coV2.order[hit.i];
        const b = coV2.order[hit.j];
        const d = coV2.data;
        const raw = d.co[d.idxOf.get(a)][d.idxOf.get(b)];
        const totalA = d.totals.get(a);
        const totalB = d.totals.get(b);
        const pctA = totalA ? Math.round(100 * raw / totalA) : 0;
        const pctB = totalB ? Math.round(100 * raw / totalB) : 0;
        const fa = escapeHtml(coFirstName(a));
        const fb = escapeHtml(coFirstName(b));

        let coupleNote = "";
        const status = coupleStatus(a, b);
        if (status) {
          const high = pctA >= 50 || pctB >= 50;
          const line = status === "married"
            ? (high
              ? "Married, and the writers clearly agree they belong together."
              : "Married, though the writers have been keeping them apart lately.")
            : (high
              ? "Dating, and getting plenty of screen time to prove it."
              : "Dating, but the writers are stingy with their scenes together.");
          coupleNote = `<br>${line}`;
        }

        tooltip.innerHTML = `<b>${escapeHtml(a)}</b> + <b>${escapeHtml(b)}</b><br>${raw} shared episodes<br>${pctA}% of ${fa}'s with ${fb}<br>${pctB}% of ${fb}'s with ${fa}${coupleNote}`;
        tooltip.style.display = "block";
        placeTooltip(tooltip, e);
      });

      canvas.addEventListener("mouseleave", () => {
        tooltip.style.display = "none";
      });

      canvas.addEventListener("click", e => {
        const rect = canvas.getBoundingClientRect();
        const px = e.clientX - rect.left;
        const py = e.clientY - rect.top;
        const m = coV2.order.length;
        const LABEL_W = 190;
        const LABEL_H = 150;
        const CELL = m > 60 ? 14 : m > 40 ? 18 : 24;
        let name = null;
        if (px < LABEL_W && py >= LABEL_H) {
          const i = Math.floor((py - LABEL_H) / CELL);
          if (i >= 0 && i < m) name = coV2.order[i];
        } else if (py < LABEL_H && px >= LABEL_W) {
          const j = Math.floor((px - LABEL_W) / CELL);
          if (j >= 0 && j < m) name = coV2.order[j];
        }
        if (name) {
          coV2.pinned = coV2.pinned === name ? null : name;
          coV2UpdateSelectedInfo();
          drawCoV2();
        }
      });

      document.getElementById("co2-sortMode").addEventListener("change", () => {
        coV2SyncTopNLock();
        drawCoV2();
      });

      document.getElementById("co2-normToggle").addEventListener("change", () => {
        drawCoV2();
      });

      document.getElementById("co2-topN").addEventListener("input", e => {
        document.getElementById("co2-topNVal").textContent = e.target.value;
        drawCoV2();
      });
    }

    function renderPairsV2() {
      const content = document.getElementById("panel-pairs-v2");
      const eps = filteredEpisodes();

      if (!eps.length || !appearanceData) {
        content.innerHTML = '<p class="empty-state">No data.</p>';
        coV2.bound = false;
        document.getElementById("stats").textContent = "No data";
        return;
      }

      coV2.data = buildCoV2Data(eps);
      const charCount = coV2.data.allChars.length;
      const topMax = Math.max(10, Math.floor(charCount / 5) * 5);
      const topDefault = Math.min(40, topMax);

      if (!coV2.bound) {
        content.innerHTML = `
          <div class="co2-controls">
            <select id="co2-sortMode">
              <option value="total_desc">Sort: appearances</option>
              <option value="strength_desc">Sort: co-occurrence strength</option>
              <option value="alpha">Sort: A-Z</option>
            </select>
            <label class="co2-field">Top
              <input type="range" id="co2-topN" min="10" max="${topMax}" value="${topDefault}" step="5">
              <span class="val" id="co2-topNVal">${topDefault}</span>
            </label>
            <label class="co2-field">
              <input type="checkbox" id="co2-normToggle">
              % shared episodes
            </label>
          </div>
          <section>
            <h2>Co-appearance grid</h2>
            <p class="caption">${escapeHtml(analysisWindow(eps))} How often two characters share an episode.</p>
            <div class="co2-matrix-wrap">
              <canvas id="co2-canvas"></canvas>
            </div>
            <div class="co2-legend">
              <span>0</span>
              <div class="bar"></div>
              <span id="co2-legendMax">0</span>
              <span id="co2-selectedInfo"></span>
            </div>
            <p class="co2-hint">Hover a cell for details. Click a row or column label to pin a character and highlight their co-appearances.</p>
          </section>
          <section>
            <h2>Top pairs <span id="co2-topPairsCount"></span></h2>
            <p class="caption">The 40 character pairs who share the most episodes within the selected season range, independent of the sort order and Top slider used for the grid above.</p>
            <div class="co2-pairs-cols">
              <table class="co2-pairs" id="co2-pairsTableA"><thead><tr><th>#</th><th>Pair</th><th>Episodes</th></tr></thead><tbody></tbody></table>
              <table class="co2-pairs" id="co2-pairsTableB"><thead><tr><th>#</th><th>Pair</th><th>Episodes</th></tr></thead><tbody></tbody></table>
            </div>
          </section>`;
        bindCoV2Events();
        coV2.bound = true;
      } else {
        const topN = document.getElementById("co2-topN");
        const topMax = Math.max(10, Math.floor(charCount / 5) * 5);
        topN.max = topMax;
        let val = Math.min(parseInt(topN.value, 10), topMax);
        val = Math.max(10, Math.round(val / 5) * 5);
        topN.value = val;
        document.getElementById("co2-topNVal").textContent = val;
        coV2SyncTopNLock();
        const caption = content.querySelector(".caption");
        if (caption) caption.textContent = `${analysisWindow(eps)} How often two characters share an episode.`;
      }

      drawCoV2();
      buildCoV2PairsTables();
      coV2UpdateSelectedInfo();
      document.getElementById("stats").textContent =
        `${eps.length} episodes, ${charCount} characters`;
    }

    function populateTimelineSelect() {
      const sel = document.getElementById("timeline-select");
      const counts = appearanceCounts();
      const names = Object.keys(counts).sort((a, b) => a.localeCompare(b, "fr"));
      sel.innerHTML = names.map(n =>
        `<option value="${escapeAttr(n)}">Character: ${escapeHtml(n)}</option>`
      ).join("");
      timelineChar = names.includes("Rose Latour") ? "Rose Latour" : names[0];
      sel.value = timelineChar;
    }

    function render() {
      const searchEl = document.getElementById("search");
      const timelineSel = document.getElementById("timeline-select");
      const seasonSel = document.getElementById("season-select");
      const heatmapSortSel = document.getElementById("heatmap-sort");
      const hideSearchTabs = ["overview", "come-go", "pairs-v2", "viewership"];
      const seasonSelectTabs = ["overview", "pairs-v2", "heatmap"];
      searchEl.style.display = (activeTab === "timeline" || hideSearchTabs.includes(activeTab)) ? "none" : "";
      timelineSel.style.display = activeTab === "timeline" ? "" : "none";
      seasonSel.style.display = seasonSelectTabs.includes(activeTab) ? "" : "none";
      heatmapSortSel.style.display = activeTab === "heatmap" ? "" : "none";

      const renderers = {
        overview: renderOverview,
        "by-episode": renderByEpisode,
        "by-character": renderByCharacter,
        "come-go": renderComeGo,
        arcs: renderArcs,
        "pairs-v2": renderPairsV2,
        heatmap: renderHeatmap,
        timeline: renderTimeline,
        viewership: renderViewership,
      };
      (renderers[activeTab] || renderOverview)();
    }

    function pct(n, d) {
      return d ? (100 * n / d).toFixed(1) : "0.0";
    }

    function buildBarRows(names, counts, maxCount, denom, { showDeparture = false } = {}) {
      if (!names.length) return '<p class="empty-state">No data.</p>';
      const map = byCharacterMap();
      return names.map((name, i) => {
        const c = counts[name];
        const widthPct = maxCount ? (c / maxCount * 100) : 0;
        const color = characterColor(name) || "var(--neutral-data)";
        const dep = showDeparture ? departureNote(name, map[name]) : null;
        return `
          <div class="bar-row" data-name="${escapeAttr(name)}">
            <span class="rank">${i + 1}</span>
            <span class="name">${nameHtml(name)}${dep ? `<span class="departure"> (${escapeHtml(dep)})</span>` : ""}</span>
            <span class="bar-track"><span class="bar-fill" style="width:${widthPct}%;background:${color}"></span></span>
            <span class="value">${c} <span class="pct-note">(${pct(c, denom)}%)</span></span>
          </div>`;
      }).join("");
    }

    function buildCastSizeChart(eps, sizes) {
      const w = Math.max(640, eps.length * 7);
      const h = 90;
      const pad = { t: 10, r: 8, b: 10, l: 8 };
      const max = Math.max(...sizes);
      const min = Math.min(...sizes);
      const innerW = w - pad.l - pad.r;
      const innerH = h - pad.t - pad.b;
      const avgV = avg(sizes);

      const xy = (i, s) => {
        const x = pad.l + (i / (sizes.length - 1 || 1)) * innerW;
        const y = pad.t + innerH - ((s - min) / (max - min || 1)) * innerH;
        return [x, y];
      };

      const avgY = pad.t + innerH - ((avgV - min) / (max - min || 1)) * innerH;
      const allPts = sizes.map((s, i) => xy(i, s).join(",")).join(" ");
      const areaPts = `${pad.l},${pad.t + innerH} ${allPts} ${pad.l + innerW},${pad.t + innerH}`;
      const gid = "cast-grad-" + Math.random().toString(36).slice(2, 8);

      const segments = [];
      let current = null;
      eps.forEach((ep, i) => {
        const sn = seasonOf(ep);
        if (!current || current.season !== sn) {
          if (current) segments.push(current);
          current = { season: sn, indices: i > 0 ? [i - 1] : [] };
        }
        current.indices.push(i);
      });
      if (current) segments.push(current);

      const polylines = segments.map(seg => {
        const pts = seg.indices.map(i => xy(i, sizes[i]).join(",")).join(" ");
        const color = SEASON_CHART_COLORS[seg.season] || "#b7ac93";
        return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5"/>`;
      }).join("");

      const legendItems = SEASONS.map(s => `
        <span class="chart-legend-item">
          <span class="chart-swatch" style="background:${SEASON_CHART_COLORS[s.n]}"></span>
          Season ${s.n}
        </span>`).join("");

      return `
        <div class="chart-box">
          <svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" role="img" aria-label="Cast size over episodes">
            <defs>
              <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#7d2a3d" stop-opacity="0.12"/>
                <stop offset="100%" stop-color="#7d2a3d" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <polygon points="${areaPts}" fill="url(#${gid})" stroke="none"/>
            <line x1="${pad.l}" y1="${avgY}" x2="${w - pad.r}" y2="${avgY}" stroke="#a49c8c" stroke-width="1" stroke-dasharray="4 3"/>
            ${polylines}
          </svg>
          <div class="chart-legend">
            ${legendItems}
            <span class="chart-legend-item">
              <span class="chart-swatch avg"></span>
              Average (${avgV.toFixed(1)})
            </span>
          </div>
        </div>`;
    }

    function renderOverview() {
      const content = document.getElementById("panel-overview");
      const allEps = allEpisodeNumbers();
      const sizes = allEps.map(ep => appearanceData.episodes[String(ep)].length);
      const nEps = allEps.length;

      const eps = filteredEpisodes();
      const counts = appearanceCountsForEpisodes(eps);
      const sortedNames = Object.keys(counts).sort((a, b) => counts[b] - counts[a] || a.localeCompare(b, "fr"));
      const top = sortedNames.slice(0, 15);
      const maxCount = top.length ? counts[top[0]] : 0;
      const scopeAll = document.getElementById("season-select").value === "all";

      const seasonsLabel = trackedSeasonsLabel(allEps);
      const seasonPhrase = seasonsLabel.includes("-")
        ? `seasons ${seasonsLabel.replace("-", " through ")}`
        : `season ${seasonsLabel}`;

      content.innerHTML = `
        <p class="lede">This tracker follows <strong>${nEps}</strong> episodes so far, from episode <strong>${allEps[0]}</strong> through <strong>${allEps[allEps.length - 1]}</strong>, spanning ${seasonPhrase}.</p>

        <section>
          <h2>Cast size by episode</h2>
          ${buildCastSizeChart(allEps, sizes)}
          <p class="caption">${escapeHtml(analysisWindow(allEps, "all"))} How many characters were in the credits per episode, colored by season. Dashed line marks the average.</p>
        </section>

        <section>
          <h2>Most frequent characters</h2>
          <p class="caption">${escapeHtml(analysisWindow(eps))} Share of these episodes each character appeared in credits for.</p>
          <div class="bar-rows">${buildBarRows(top, counts, maxCount, eps.length, { showDeparture: scopeAll })}</div>
        </section>`;

      const barsEl = content.querySelector(".bar-rows");
      if (barsEl) {
        barsEl.addEventListener("click", e => {
          const row = e.target.closest(".bar-row");
          if (row) goToTimeline(row.dataset.name);
        });
      }

      document.getElementById("stats").textContent = `${nEps} episodes`;
    }

    function heatmapShowLabel(i, total) {
      if (i === 0 || i === total - 1) return true;
      return i % 10 === 0;
    }

    function heatmapBoundary(ep, i, total) {
      return SEASON_ENDS.has(ep) && i < total - 1;
    }

    function heatmapFirstAppearance(name, map, epsSet) {
      const found = (map[name] || []).find(ep => epsSet.has(ep));
      return found ?? Infinity;
    }

    function buildHeatmapHeader(eps) {
      let cells = `<div class="hm-corner"></div>`;
      eps.forEach((ep, i) => {
        const hasLabel = heatmapShowLabel(i, eps.length);
        const tick = hasLabel ? `<span class="hm-tick">${ep}</span>` : "";
        const cls = ["hm-tick-cell"];
        if (hasLabel) cls.push("labeled");
        if (heatmapBoundary(ep, i, eps.length)) cls.push("boundary");
        cells += `<div class="${cls.join(" ")}" data-col="${i}">${tick}</div>`;
      });
      return cells;
    }

    function goToTimeline(name) {
      document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.tab === "timeline"));
      document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === "panel-timeline"));
      activeTab = "timeline";
      document.getElementById("timeline-select").value = name;
      render();
    }

    function placeTooltip(tooltip, e) {
      const pad = 14;
      const rect = tooltip.getBoundingClientRect();
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      let left = e.clientX + pad;
      let top = e.clientY + pad;
      if (left + rect.width > vw - 4) left = e.clientX - rect.width - pad;
      if (top + rect.height > vh - 4) top = e.clientY - rect.height - pad;
      if (left < 4) left = 4;
      if (top < 4) top = 4;
      tooltip.style.left = left + "px";
      tooltip.style.top = top + "px";
    }

    function showAppTooltip(text, e) {
      const tooltip = document.getElementById("app-tooltip");
      tooltip.textContent = text;
      tooltip.style.display = "block";
      placeTooltip(tooltip, e);
    }

    function setupHeatmapInteractions(grid) {
      const tooltip = document.getElementById("app-tooltip");
      const clear = () => grid.querySelectorAll(".hm-highlight").forEach(el => el.classList.remove("hm-highlight"));

      grid.addEventListener("mouseover", e => {
        const cell = e.target.closest(".hm-cell");
        const label = e.target.closest(".hm-label");

        if (cell) {
          clear();
          const { row, col, name, ep } = cell.dataset;
          grid.querySelectorAll(`.hm-cell[data-row="${row}"]`).forEach(el => el.classList.add("hm-highlight"));
          grid.querySelectorAll(`.hm-cell[data-col="${col}"]`).forEach(el => el.classList.add("hm-highlight"));
          grid.querySelector(`.hm-label[data-row="${row}"]`)?.classList.add("hm-highlight");
          grid.querySelector(`.hm-tick-cell[data-col="${col}"]`)?.classList.add("hm-highlight");
          if (cell.classList.contains("on")) {
            const arc = arcForEpisode(Number(ep));
            const arcNote = arc ? ` (${arc.title})` : "";
            showAppTooltip(`${name}, ep ${ep}${arcNote}`, e);
          } else {
            tooltip.style.display = "none";
          }
        } else if (label) {
          showAppTooltip(`${label.dataset.name} (click for timeline)`, e);
        } else {
          tooltip.style.display = "none";
        }
      });

      grid.addEventListener("mousemove", e => {
        if (tooltip.style.display !== "none" && (e.target.closest(".hm-cell") || e.target.closest(".hm-label"))) {
          placeTooltip(tooltip, e);
        }
      });

      grid.addEventListener("mouseleave", () => {
        clear();
        tooltip.style.display = "none";
      });

      grid.addEventListener("click", e => {
        const label = e.target.closest(".hm-label");
        if (label) goToTimeline(label.dataset.name);
      });
    }

    function renderHeatmap() {
      const content = document.getElementById("panel-heatmap");
      const q = query();
      const eps = filteredEpisodes();
      const counts = appearanceCountsForEpisodes(eps);
      const map = byCharacterMap();
      const sortMode = document.getElementById("heatmap-sort").value;
      const colW = 18;

      let names = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
      if (q) names = names.filter(n => normalizeSearch(n).includes(q));
      names = names.slice(0, 40);

      if (!names.length) {
        content.innerHTML = '<p class="empty-state">No matches.</p>';
        document.getElementById("stats").textContent = "No data";
        return;
      }

      if (sortMode === "alpha") {
        names = [...names].sort((a, b) => a.localeCompare(b, "fr"));
      } else if (sortMode === "first") {
        const epsSet = new Set(eps);
        names = [...names].sort((a, b) =>
          heatmapFirstAppearance(a, map, epsSet) - heatmapFirstAppearance(b, map, epsSet) ||
          a.localeCompare(b, "fr")
        );
      }

      const cols = `9rem repeat(${eps.length}, ${colW}px)`;

      let body = buildHeatmapHeader(eps);
      names.forEach((name, i) => {
        const set = new Set(map[name]);
        body += `<div class="hm-label" data-row="${i}" data-name="${escapeAttr(name)}">${nameHtml(name)}</div>`;
        eps.forEach((ep, j) => {
          const on = set.has(ep);
          const cls = ["hm-cell"];
          if (on) cls.push("on");
          if (heatmapBoundary(ep, j, eps.length)) cls.push("boundary");
          body += `<div class="${cls.join(" ")}" data-row="${i}" data-col="${j}" data-name="${escapeAttr(name)}" data-ep="${ep}"></div>`;
        });
      });

      content.innerHTML = `
        <section>
          <h2>Presence map</h2>
          <p class="caption">${escapeHtml(analysisWindow(eps))} Filled squares mark episodes where a character was in the credits. Top ${names.length} characters by appearances in this range. Episode numbers run along the top (every 10 episodes). Click a name to open its timeline.</p>
          <div class="heatmap-wrap">
            <div class="heatmap" style="grid-template-columns: ${cols}">${body}</div>
          </div>
        </section>`;

      setupHeatmapInteractions(content.querySelector(".heatmap"));

      document.getElementById("stats").textContent =
        `${names.length} x ${eps.length}`;
    }

    function buildPresenceStrip(eps, presentSet, color) {
      const w = Math.max(640, eps.length * 4);
      const h = 34;
      const n = eps.length;
      const colW = w / n;

      let bars = `<rect x="0" y="0" width="${w}" height="${h}" fill="#f2ede1"></rect>`;
      let hits = "";
      eps.forEach((ep, i) => {
        const x = i * colW;
        const on = presentSet.has(ep);
        if (on) {
          bars += `<rect x="${x}" y="0" width="${Math.max(colW - 0.4, 0.6)}" height="${h}" fill="${color}"></rect>`;
        }
        hits += `<rect class="pr-hit" x="${x}" y="0" width="${colW}" height="${h}" data-ep="${ep}" data-on="${on ? 1 : 0}"></rect>`;
      });

      let lines = "";
      SEASONS.forEach(s => {
        const idx = eps.indexOf(s.end);
        if (idx >= 0 && idx < n - 1) {
          const x = (idx + 1) * colW;
          lines += `<line x1="${x}" y1="0" x2="${x}" y2="${h}" stroke="#fbf9f5" stroke-width="2.5"/>`;
        }
      });

      return `<svg class="presence-svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${bars}${lines}${hits}</svg>`;
    }

    function setupPresenceHover(svg) {
      if (!svg) return;
      const tooltip = document.getElementById("app-tooltip");
      svg.addEventListener("mousemove", e => {
        const hit = e.target.closest(".pr-hit");
        if (!hit || hit.dataset.on !== "1") { tooltip.style.display = "none"; return; }
        const ep = Number(hit.dataset.ep);
        const arc = arcForEpisode(ep);
        const arcNote = arc ? ` (${arc.title})` : "";
        showAppTooltip(`Episode ${ep}: in credits${arcNote}`, e);
      });
      svg.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });
    }

    function renderTimeline() {
      const content = document.getElementById("panel-timeline");
      timelineChar = document.getElementById("timeline-select").value;
      const eps = allEpisodeNumbers();
      const charEps = byCharacterMap()[timelineChar] || [];
      const set = new Set(charEps);
      const counts = appearanceCounts();
      const streak = longestStreak(charEps, eps);

      const lastCharEp = charEps.length ? charEps[charEps.length - 1] : null;
      const lastTrackedEp = eps[eps.length - 1];
      const timelineEps = (lastCharEp != null && lastCharEp < lastTrackedEp)
        ? eps.filter(ep => ep <= lastCharEp)
        : eps;

      const status = characterStatus(timelineChar, charEps);
      const truncated = timelineEps.length < eps.length;
      const presenceCaption = truncated
        ? `Stops at last credited episode (${lastCharEp}). ${escapeHtml(analysisWindow(timelineEps, "all"))}`
        : `${escapeHtml(analysisWindow(eps, "all"))}`;

      const firstEp = charEps.length ? charEps[0] : null;
      const shareDenom = firstEp != null ? lastTrackedEp - firstEp : 0;
      const share = pct(charEps.length, shareDenom);
      const color = characterColor(timelineChar) || "var(--neutral-data)";

      const ledeText = charEps.length
        ? `Appeared in <strong>${charEps.length}</strong> episode${charEps.length === 1 ? "" : "s"} so far (<strong>${share}%</strong> of episodes since debuting in ep. <strong>${firstEp}</strong>), including a run of <strong>${streak}</strong> consecutive episode${streak === 1 ? "" : "s"}.`
        : `No tracked appearances yet.`;

      const photo = CHARACTER_PHOTOS[timelineChar];
      const photoHtml = photo
        ? `<figure class="char-photo">
            <img src="${escapeAttr(photo.src)}" alt="${escapeAttr(timelineChar)}" loading="lazy">
            <figcaption>Photo: <a href="${escapeAttr(photo.src)}" target="_blank" rel="noopener noreferrer">${escapeHtml(photo.credit)}</a></figcaption>
          </figure>`
        : "";

      content.innerHTML = `
        <section>
          <div class="timeline-head">
            <div class="timeline-head-text">
              <h2>${nameHtml(timelineChar)}</h2>
              <p class="lede">${ledeText}</p>
              ${status.text ? `<p class="caption${status.departed ? " departure" : ""}">${escapeHtml(status.text)}</p>` : ""}
              <p class="caption">Share of episodes runs from this character's first tracked appearance through episode ${lastTrackedEp}. This dataset only tracks season 4 onward, so earlier history isn't reflected.</p>
            </div>
            ${photoHtml}
          </div>
          <h3>Presence</h3>
          <p class="caption">${presenceCaption} Colored bars mark episodes where ${escapeHtml(coFirstName(timelineChar))} was in the credits; dashed lines mark season breaks.</p>
          <div class="chart-box">${buildPresenceStrip(timelineEps, set, color)}</div>
        </section>`;

      setupPresenceHover(content.querySelector(".presence-svg"));

      document.getElementById("stats").innerHTML =
        `${nameHtml(timelineChar)}: ${counts[timelineChar] || 0} episodes`;
    }

    function sortThHtml(col, label, extraClass = "") {
      const active = sortCol === col;
      const asc = sortDir === 1;
      const sortedCls = active ? (asc ? " sorted-asc" : " sorted-desc") : "";
      const icon = col === "name" ? sortAlphaIcon(active, asc) : sortNumIcon(active, asc);
      const cls = [extraClass, sortedCls].filter(Boolean).join(" ");
      return `<th data-col="${col}" class="${cls}">${escapeHtml(label)}${icon}</th>`;
    }

    function sortArrowPath(active, asc) {
      if (!active) return 'M14 5v8M11.5 10.5L14 13l2.5-2.5';
      return asc ? "M14 4v10M11 11l3 3 3-3" : "M14 16V6M11 9l3-3 3 3";
    }

    function sortAlphaIcon(active, asc) {
      const arrow = sortArrowPath(active, asc);
      return `<span class="sort-icon" aria-hidden="true"><svg viewBox="0 0 20 20" width="14" height="14"><text x="1" y="8" font-size="7.5" font-family="ui-monospace,monospace" font-weight="700" fill="currentColor">A</text><text x="1" y="17" font-size="7.5" font-family="ui-monospace,monospace" font-weight="700" fill="currentColor">Z</text><path d="${arrow}" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;
    }

    function sortNumIcon(active, asc) {
      const arrow = sortArrowPath(active, asc);
      return `<span class="sort-icon" aria-hidden="true"><svg viewBox="0 0 20 20" width="14" height="14"><text x="0.5" y="9" font-size="7.5" font-family="ui-monospace,monospace" font-weight="700" fill="currentColor">9</text><text x="0.5" y="17" font-size="7.5" font-family="ui-monospace,monospace" font-weight="700" fill="currentColor">0</text><path d="${arrow}" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;
    }

    function renderByEpisode() {
      const content = document.getElementById("panel-by-episode");
      const q = query();
      content.innerHTML = "";

      const eps = allEpisodeNumbers();
      let shown = 0;

      eps.forEach(ep => {
        let names = [...appearanceData.episodes[String(ep)]].sort((a, b) => a.localeCompare(b, "fr"));
        if (q) {
          names = names.filter(n => normalizeSearch(n).includes(q) || String(ep).includes(q));
          if (!names.length && !String(ep).includes(q)) return;
        }

        const arc = arcForEpisode(ep);
        const arcNote = arc ? `, ${escapeHtml(arc.title)}` : "";
        const seasonColor = SEASON_CHART_COLORS[seasonOf(ep)] || "var(--border-strong)";
        const section = document.createElement("section");
        section.className = "ep-entry";
        section.style.borderLeftColor = seasonColor;
        section.innerHTML = `
          <h2><span class="ep-num">Ep ${ep}</span> <span class="note">${names.length} characters${arcNote}</span></h2>
          <p class="name-list">${names.map(n => nameHtml(n)).join(", ")}</p>`;
        content.appendChild(section);
        shown += names.length;
      });

      document.getElementById("stats").textContent = eps.length
        ? `${eps.length} episodes, ${shown} characters`
        : "No data";

      if (!eps.length) {
        content.innerHTML = '<p class="empty-state">No episode data.</p>';
      }
    }

    function drawSparkline(canvas, presentSet, allEps, color) {
      const dpr = window.devicePixelRatio || 1;
      const W = 160, H = 14;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = "#f2ede1";
      ctx.fillRect(0, 0, W, H);

      const n = allEps.length;
      if (!n) return;
      const colW = W / n;
      ctx.fillStyle = color;
      allEps.forEach((ep, i) => {
        if (presentSet.has(ep)) {
          ctx.fillRect(i * colW, 0, Math.max(colW, 0.6), H);
        }
      });

      ctx.strokeStyle = "rgba(251,249,245,0.95)";
      ctx.lineWidth = 1.5;
      SEASONS.forEach(s => {
        const idx = allEps.indexOf(s.end);
        if (idx >= 0 && idx < n - 1) {
          const x = (idx + 1) * colW;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, H);
          ctx.stroke();
        }
      });
    }

    function renderByCharacter() {
      const content = document.getElementById("panel-by-character");
      const q = query();
      content.innerHTML = "";

      const map = byCharacterMap();
      const allEps = allEpisodeNumbers();
      let entries = Object.entries(map);

      if (q) {
        entries = entries.filter(([name, eps]) =>
          normalizeSearch(name).includes(q) || eps.some(e => String(e).includes(q))
        );
      }

      entries.sort((a, b) => {
        if (sortCol === "name") return a[0].localeCompare(b[0], "fr") * sortDir;
        if (sortCol === "count") return (a[1].length - b[1].length) * sortDir;
        return a[0].localeCompare(b[0], "fr");
      });

      if (!entries.length) {
        content.innerHTML = '<p class="empty-state">No data.</p>';
        document.getElementById("stats").textContent = "No data";
        return;
      }

      const table = document.createElement("table");
      table.innerHTML = `
        <thead><tr>
          ${sortThHtml("name", "Character")}
          ${sortThHtml("count", "Episodes", "num")}
          <th class="no-sort">Status</th>
          <th class="no-sort">Presence</th>
        </tr></thead>`;
      const tbody = document.createElement("tbody");

      entries.forEach(([name, eps]) => {
        const status = characterStatus(name, eps);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${nameHtml(name)}</td>
          <td class="num">${eps.length}</td>
          <td${status.departed ? ' class="departure"' : ""}>${status.text ? escapeHtml(status.text) : ""}</td>
          <td class="spark-cell"><canvas class="spark-canvas"></canvas></td>`;
        tr.addEventListener("click", () => goToTimeline(name));
        tbody.appendChild(tr);
        const canvas = tr.querySelector("canvas");
        drawSparkline(canvas, new Set(eps), allEps, characterColor(name) || "#b7ac93");
      });

      table.appendChild(tbody);
      content.appendChild(table);

      table.querySelector("thead").addEventListener("click", e => {
        const th = e.target.closest("th");
        if (!th || !th.dataset.col) return;
        const col = th.dataset.col;
        if (sortCol === col) sortDir *= -1;
        else { sortCol = col; sortDir = 1; }
        render();
      });

      document.getElementById("stats").textContent = `${entries.length} characters`;
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function escapeAttr(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;");
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        activeTab = btn.dataset.tab;
        document.getElementById(`panel-${activeTab}`).classList.add("active");
        sortCol = "name";
        sortDir = 1;
        render();
      });
    });

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("season-select").addEventListener("change", render);
    document.getElementById("timeline-select").addEventListener("change", render);
    document.getElementById("heatmap-sort").addEventListener("change", render);
    load();
  </script>
</body>
</html>
