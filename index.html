<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Ici tout commence: character appearances</title>
  <style>
    :root {
      --bg: #fbf9f5;
      --bg-alt: #f4f0e7;
      --fg: #24211d;
      --muted: #7c7568;
      --muted-2: #a49c8c;
      --border: #e4dccc;
      --border-strong: #cec3ac;
      --code-bg: #f2ede1;
      --accent: #7d2a3d;
      --accent-dim: #a5566a;
      --accent-soft: #f6e9e7;
      --tooltip-accent: #f0b8a4;
      --mono: ui-monospace, "Cascadia Code", "SF Mono", Menlo, Monaco, Consolas, monospace;
      --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --s4: #923548;
      --s5: #1478c7;
      --s6: #3f8a55;
      --neutral-data: #b7ac93;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    .top-rule {
      height: 4px;
      background: linear-gradient(to right, var(--s4), var(--s5), var(--s6));
    }

    body {
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      color: var(--fg);
      background: var(--bg);
      min-height: 100vh;
    }

    .file-banner {
      display: none;
      background: var(--accent-soft);
      border-bottom: 1px solid var(--border-strong);
      padding: 0.5rem 1.25rem;
      font-size: 0.85rem;
      color: #5c2430;
    }

    .file-banner code {
      font-family: var(--mono);
      font-size: 0.82rem;
      background: var(--bg);
      padding: 0.05rem 0.3rem;
      border: 1px solid var(--border-strong);
    }

    .doc {
      max-width: 74rem;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    header {
      margin-bottom: 1.75rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .kicker {
      font-family: var(--sans);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: var(--serif);
      font-size: 2.3rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.15;
      color: var(--fg);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 0.5rem;
      max-width: 42rem;
    }

    nav.tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem 1.35rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.65rem;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
    }

    .tab {
      background: none;
      border: none;
      color: var(--muted);
      padding: 0.2rem 0;
      cursor: pointer;
      font: inherit;
      border-bottom: 2px solid transparent;
      margin-bottom: -0.72rem;
      transition: color 0.15s ease, border-color 0.15s ease;
    }

    .tab:hover { color: var(--fg); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 0.75rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .controls.hidden { display: none; }

    input[type="search"],
    select {
      font: inherit;
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
    }

    input[type="search"] { flex: 1; min-width: 12rem; }

    input:focus, select:focus {
      outline: 2px solid var(--accent-dim);
      outline-offset: -1px;
    }

    .stats {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    section { margin-bottom: 2.4rem; }

    h2 {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 0.75rem;
      padding-left: 0.85rem;
      position: relative;
    }

    h2::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.2em;
      bottom: 0.22em;
      width: 3px;
      background: var(--accent);
      border-radius: 1px;
    }

    h3 {
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 400;
      color: var(--fg);
      margin: 1.1rem 0 0.5rem;
    }

    p, .prose { margin-bottom: 0.75rem; }
    .prose { color: var(--fg); }

    .note {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
    }

    .caption {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 0.4rem;
      margin-bottom: 0.6rem;
      font-family: var(--serif);
      line-height: 1.5;
    }

    .caption.departure { color: var(--accent-dim); }

    .info-box {
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
      background: #fbf3de;
      border: 1px solid #e6d6a4;
      border-radius: 6px;
      padding: 0.75rem 0.95rem;
      margin-bottom: 1.25rem;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .info-box .bulb {
      font-size: 1.1rem;
      line-height: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.87rem;
      margin-bottom: 0.5rem;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 0.4rem 0.6rem;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: var(--code-bg);
      font-weight: 600;
      font-size: 0.78rem;
    }

    th[data-col] { cursor: pointer; user-select: none; }
    th[data-col]:hover { background: #ece4d3; }

    .sort-icon {
      display: inline-flex;
      align-items: center;
      margin-left: 0.35rem;
      vertical-align: -0.1em;
      color: var(--muted);
      opacity: 0.55;
    }

    th[data-col].sorted-asc .sort-icon,
    th[data-col].sorted-desc .sort-icon {
      color: var(--accent);
      opacity: 1;
    }

    #panel-by-character table {
      table-layout: fixed;
      width: 100%;
    }

    #panel-by-character th[data-col] { white-space: nowrap; }

    #panel-by-character th:nth-child(1),
    #panel-by-character td:nth-child(1) { width: auto; }

    #panel-by-character th:nth-child(2),
    #panel-by-character td:nth-child(2) { width: 6.5rem; }

    #panel-by-character th:nth-child(3),
    #panel-by-character td:nth-child(3) { width: 13rem; }

    #panel-by-character th:nth-child(4),
    #panel-by-character td:nth-child(4) { width: 11.5rem; }

    #panel-by-character tr {
      cursor: pointer;
    }

    #panel-by-character tr:hover td {
      background: var(--accent-soft);
    }

    td.spark-cell { padding: 0.3rem 0.6rem; }
    .spark-canvas { display: block; border-radius: 2px; }

    td.num, th.num { text-align: right; font-family: var(--mono); font-variant-numeric: tabular-nums; }

    td.mono { font-family: var(--mono); font-size: 0.82rem; }

    tr:nth-child(even) td { background: var(--bg-alt); }
    #panel-by-character tr:nth-child(even):hover td { background: var(--accent-soft); }

    .empty-state {
      padding: 2rem 0;
      color: var(--muted);
      text-align: left;
    }

    .empty-state code {
      font-family: var(--mono);
      font-size: 0.85rem;
      background: var(--code-bg);
      padding: 0.1rem 0.3rem;
      border: 1px solid var(--border);
    }

    .name-list {
      font-family: var(--mono);
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--fg);
    }

    .departure {
      font-size: 0.78rem;
      color: var(--accent-dim);
      font-weight: 400;
    }

    /* Lede paragraph (key figures woven into prose) ------------------ */

    .lede {
      font-family: var(--serif);
      font-size: 1.1rem;
      line-height: 1.65;
      color: var(--fg);
      max-width: 44rem;
      padding: 0.1rem 0 1.5rem 1.1rem;
      margin-bottom: 1.75rem;
      border-bottom: 1px solid var(--border);
      border-left: 3px solid var(--accent);
    }

    .lede strong {
      font-weight: 600;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    /* Horizontal bar rows (rankings) -------------------------------- */

    .bar-rows {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 1.6rem minmax(8rem, 15rem) 1fr auto;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.87rem;
      padding: 0.15rem 0.3rem;
      border-radius: 3px;
      transition: background 0.1s ease;
    }

    .bar-row:hover { background: var(--accent-soft); cursor: pointer; }

    .bar-row .rank {
      color: var(--muted-2);
      font-family: var(--mono);
      font-size: 0.78rem;
      text-align: right;
    }

    .bar-row .name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-track {
      position: relative;
      height: 0.8rem;
      background: var(--code-bg);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      position: absolute;
      inset: 0;
      right: auto;
      border-radius: 2px;
    }

    .bar-row .value {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      text-align: right;
    }

    .bar-row .value .pct-note { color: var(--muted-2); font-size: 0.72rem; }

    @media (max-width: 640px) {
      .bar-row { grid-template-columns: 1.4rem minmax(6rem, 9rem) 1fr auto; }
    }

    /* Vertical grouped bar chart (cast changes) --------------------- */

    .vbar-chart {
      display: flex;
      align-items: flex-end;
      gap: 2rem;
      height: 130px;
      padding: 0 0.5rem;
    }

    .vbar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      max-width: 9rem;
    }

    .vbar-bars {
      display: flex;
      align-items: flex-end;
      gap: 0.4rem;
      height: 100px;
    }

    .vbar {
      width: 1.6rem;
      border-radius: 2px 2px 0 0;
      min-height: 2px;
    }

    .vbar-group .season-label {
      font-size: 0.78rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* Chart boxes / SVG line & area charts --------------------------- */

    .chart-box {
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.85rem;
      overflow-x: auto;
      background: var(--bg);
    }

    .ts-hit, .pr-hit { fill: transparent; cursor: crosshair; }

    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.1rem;
      margin-top: 0.6rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .chart-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .chart-swatch {
      display: inline-block;
      width: 1rem;
      height: 0.2rem;
      border-radius: 1px;
    }

    .chart-swatch.avg {
      width: 1.25rem;
      height: 0;
      border-top: 2px dashed var(--muted-2);
    }

    .presence-svg, .ts-chart { display: block; }

    .timeline-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.75rem;
    }

    .timeline-head-text { flex: 1 1 auto; min-width: 0; }

    .char-photo {
      flex: 0 0 auto;
      width: 128px;
      margin: 0.1rem 0 0;
    }

    .char-photo img {
      width: 100%;
      height: 162px;
      object-fit: cover;
      display: block;
      border-radius: 6px;
      border: 1px solid var(--border-strong);
      background: var(--bg-alt);
    }

    .char-photo figcaption {
      font-family: var(--serif);
      font-style: italic;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
      margin-top: 0.35rem;
      line-height: 1.3;
    }

    .char-photo figcaption a { color: inherit; }

    @media (max-width: 640px) {
      .timeline-head { flex-direction: column-reverse; }
      .char-photo { width: 110px; align-self: flex-start; }
    }

    /* Heatmap ------------------------------------------------------- */

    .heatmap-wrap {
      overflow: auto;
      max-height: 70vh;
      border: 1px solid var(--border);
      border-radius: 5px;
    }

    .heatmap {
      display: grid;
      gap: 1px;
      background: var(--border);
      width: max-content;
    }

    .hm-corner {
      position: sticky;
      top: 0;
      left: 0;
      z-index: 5;
      min-height: 2.25rem;
      background: var(--code-bg);
    }

    .hm-tick-cell {
      position: sticky;
      top: 0;
      z-index: 3;
      min-height: 2.25rem;
      background: var(--code-bg);
    }

    .hm-tick-cell.labeled { z-index: 4; }

    .hm-tick {
      position: absolute;
      left: 50%;
      bottom: 6px;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 0.72rem;
      white-space: nowrap;
      color: var(--fg);
      line-height: 1;
    }

    .hm-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 0 0.35rem;
      height: 18px;
      line-height: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: sticky;
      left: 0;
      z-index: 2;
      max-width: 9rem;
      background: var(--code-bg);
      cursor: pointer;
    }

    .hm-label:hover { text-decoration: underline; }

    .hm-cell { width: 18px; height: 18px; background: var(--bg); }
    .hm-cell.on { background: var(--accent); }

    .hm-tick-cell.boundary,
    .hm-cell.boundary { border-right: 2px solid var(--border-strong); }

    .hm-label.hm-highlight,
    .hm-tick-cell.hm-highlight { background: var(--accent-soft); }

    .hm-cell.hm-highlight { background: var(--accent-soft); }
    .hm-cell.on.hm-highlight { background: #5c1f2c; }

    .loading { color: var(--muted); padding: 1rem 0; }

    @media (max-width: 600px) {
      .doc { padding: 1.5rem 1rem 2.5rem; }
      .stats { width: 100%; margin-left: 0; }
      .stat { padding: 0 1rem; }
    }

    /* Co-appearance grid --------------------------------------------- */

    .co2-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 0.9rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .co2-controls select {
      font: inherit;
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: var(--bg);
      color: var(--fg);
    }

    .co2-field {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .co2-field input[type="range"] { width: 8rem; accent-color: var(--accent); }
    .co2-field .val { font-family: var(--mono); color: var(--fg); min-width: 1.6rem; text-align: right; }

    .co2-matrix-wrap {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: auto;
      max-height: 78vh;
      background: var(--bg);
    }

    #co2-canvas { display: block; cursor: crosshair; }

    .app-tooltip {
      position: fixed;
      pointer-events: none;
      background: var(--fg);
      color: #fff;
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 0.45rem 0.7rem;
      border-radius: 3px;
      width: max-content;
      max-width: 20rem;
      line-height: 1.45;
      z-index: 50;
      display: none;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
    }

    .app-tooltip b { color: var(--tooltip-accent); }

    .co2-legend {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.65rem;
      font-family: var(--mono);
      font-size: 0.76rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .co2-legend .bar {
      width: 10rem;
      height: 0.7rem;
      background: linear-gradient(to right, #FBF7F0, #F6E7D8, #EFD2B6, #E4B98F, #D59768, #C2764B, #A8583C, #833C39, #5C2430);
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    table.co2-pairs {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86rem;
    }

    table.co2-pairs th,
    table.co2-pairs td {
      text-align: left;
      padding: 0.32rem 0.6rem;
      border: none;
      border-bottom: 1px solid var(--border);
    }

    table.co2-pairs th {
      font-family: var(--mono);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      font-weight: normal;
      background: none;
    }

    table.co2-pairs td.n {
      font-family: var(--mono);
      color: var(--fg);
      text-align: right;
    }

    table.co2-pairs tr:hover td { background: var(--accent-soft); }

    .co2-pairs-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 2rem;
    }

    @media (max-width: 700px) {
      .co2-pairs-cols { grid-template-columns: 1fr; }
    }

    .co2-hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .co2-selected-tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.78rem;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--accent);
      border-radius: 3px;
      margin-left: 0.5rem;
    }

    .co2-selected-tag button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font: inherit;
      margin-left: 0.35rem;
      font-weight: bold;
    }

    /* Story arcs Gantt ------------------------------------------------ */

    .gantt-season { margin-bottom: 1rem; }

    .gantt-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .gantt-row {
      display: flex;
      height: 2.1rem;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .gantt-seg {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid rgba(255, 255, 255, 0.55);
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 600;
      color: #fff;
      overflow: hidden;
      white-space: nowrap;
      cursor: default;
    }

    .gantt-seg:last-child { border-right: none; }

    .arc-list { display: flex; flex-direction: column; }

    .arc-row {
      display: grid;
      grid-template-columns: 2.8rem 2.4rem 1fr 8rem 15rem;
      gap: 0.75rem;
      align-items: baseline;
      padding: 0.4rem 0.2rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.87rem;
    }

    .arc-row:nth-child(even) { background: var(--bg-alt); }

    .arc-num {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted-2);
    }

    .arc-season {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 700;
    }

    .arc-eps, .arc-dates {
      font-size: 0.78rem;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .arc-row { grid-template-columns: 2.2rem 2rem 1fr; }
      .arc-eps, .arc-dates { grid-column: 3; color: var(--muted); }
    }

    /* Arrivals & departures ------------------------------------------ */

    .cg-list { display: flex; flex-direction: column; margin-bottom: 0.5rem; }

    .cg-row {
      display: flex;
      align-items: baseline;
      gap: 0.65rem;
      padding: 0.35rem 0.1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.87rem;
    }

    .cg-name { min-width: 11rem; }

    .cg-note {
      margin-left: auto;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: right;
      white-space: nowrap;
    }

    .cg-note.departure { color: var(--accent-dim); font-style: italic; }

    .pill {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--muted);
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      padding: 0.05rem 0.4rem;
      flex-shrink: 0;
    }

    /* By-episode list -------------------------------------------------- */

    function seasonOf(ep) {
      const s = SEASONS.find(x => ep >= x.start && ep <= x.end);
      return s ? s.n : null;
    }

    function departureNote(name, charEps) {
      const meta = DEPARTURES[name];
      if (!meta || !charEps?.length) return null;

      const allEps = allEpisodeNumbers();
      const last = charEps[charEps.length - 1];
      if (last >= allEps[allEps.length - 1]) return null;

      const seasonEnd = SEASONS.find(s => s.n === meta.season)?.end;
      const afterSeason = seasonEnd ? charEps.filter(ep => ep > seasonEnd) : [];

      if (meta.mayReturn && afterSeason.length) {
        const returnStart = afterSeason[0];
        const beforeReturn = charEps.filter(ep => ep < returnStart);
        const lastBeforeReturn = beforeReturn.length
          ? beforeReturn[beforeReturn.length - 1]
          : last;
        return `Last ep ${lastBeforeReturn}, returned ${afterSeason[0]}-${afterSeason[afterSeason.length - 1]}`;
      }

      return `Last ep ${last}`;
    }

    function characterStatus(name, charEps) {
      const dep = departureNote(name, charEps);
      if (dep) return { text: dep, departed: true };
      const role = CHARACTER_ROLES[name];
      if (role) return { text: role, departed: false };
      return { text: "", departed: false };
    }

    function comeGoEpisodes(name) {
      return byCharacterMap()[comeGoDataName(name)] || null;
    }

    function comeGoSeasonEps(charEps, season) {
      return charEps.filter(ep => seasonOf(ep) === season);
    }

    function comeGoNote(entry) {
      const charEps = comeGoEpisodes(entry.name);
      if (!charEps?.length) return "";

      if (entry.type === "departure") {
        const note = departureNote(comeGoDataName(entry.name), charEps);
        return note || "";
      }

      const inSeason = comeGoSeasonEps(charEps, entry.season);
      if (!inSeason.length) return "";

      if (entry.type === "arrival") {
        return `First ep ${inSeason[0]}`;
      }

      if (entry.type === "return") {
        return `From ep ${inSeason[0]}`;
      }

      return "";
    }

      const dataName = comeGoDataName(entry.name);

            const note = comeGoNote(entry);

            return `<div class="cg-row"><span class="cg-name">${comeGoNameHtml(entry)}</span>${roleTag}${noteHtml}</div>`;

        if (!rows) return "";
        return `<h3>${title}</h3><div class="cg-list">${rows}</div>`;
      }).filter(Boolean).join("");

      if (!blocks) return "";
      return `<section><h2>Season ${season}</h2>${blocks}</section>`;

    function buildComeGoSummaryChart() {
      const rows = SEASONS.map(s => {
        const inSeason = CAST_MOVEMENTS.filter(m => m.season === s.n);
        return {

          arrivals: inSeason.filter(m => m.type === "arrival").length,
          returns: inSeason.filter(m => m.type === "return").length,
          departures: inSeason.filter(m => m.type === "departure").length,

    function shadeHex(hex, amt) {
      const h = hex.replace("#", "");
      const num = parseInt(h, 16);
      let r = (num >> 16) & 255, g = (num >> 8) & 255, b = num & 255;
      const mix = amt < 0 ? 0 : 255;
      const t = Math.abs(amt);
      r = Math.round(r + (mix - r) * t);
      g = Math.round(g + (mix - g) * t);
      b = Math.round(b + (mix - b) * t);
      return `rgb(${r},${g},${b})`;
    }

    function buildArcsGantt() {
      return SEASONS.map(s => {
        const arcs = STORY_ARCS.filter(a => a.season === s.n);
        const totalEps = arcs.reduce((sum, a) => sum + (a.epEnd - a.epStart + 1), 0);
        const segs = arcs.map((a, i) => {
          const w = ((a.epEnd - a.epStart + 1) / totalEps) * 100;
          const base = SEASON_CHART_COLORS[s.n];
          const bg = i % 2 === 0 ? base : shadeHex(base, -0.18);
          return `<div class="gantt-seg" style="flex:0 0 ${w}%;background:${bg}" data-arc="${a.num}">${a.num}</div>`;
        }).join("");
        return `
          <div class="gantt-season">
            <div class="gantt-label">Season ${s.n} <span class="note">${arcs.length} arcs, episodes ${s.start}-${s.end}</span></div>
            <div class="gantt-row">${segs}</div>
          </div>`;
      }).join("");
    }

    function arcForDate(dateStr) {
      const d = new Date(dateStr);
      return STORY_ARCS.find(a => d >= new Date(a.airStart) && d <= new Date(a.airEnd)) || null;
    }

    function formatDateShort(dateStr) {
      return new Date(dateStr).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }

    function formatDateAxis(dateStr) {
      const d = new Date(dateStr);
      const month = d.toLocaleDateString("en-US", { month: "short" });
      return `${month} '${String(d.getFullYear()).slice(2)}`;
    }

    // Both charts are built from the same full `rows` array (not a filtered
    // subset), so index i always lines up with the same broadcast date across
    // charts. Null values (no comparable metric that day) leave a gap in the
    // line rather than being skipped/compressed, which would otherwise shift
    // one chart's timeline out of sync with the other's.
    function buildTimeSeriesChart(rows, key, color, unit, decimals) {
      const w = Math.max(640, rows.length * 4);
      const h = 122;
      const pad = { t: 10, r: 8, b: 26, l: 8 };
      const n = rows.length;
      const values = rows.map(r => r[key]).filter(v => v != null);
      const max = Math.max(...values);
      const min = Math.min(...values);
      const innerW = w - pad.l - pad.r;
      const innerH = h - pad.t - pad.b;
      const avgV = avg(values);
      const baseY = pad.t + innerH;

      const xAt = i => pad.l + (i / (n - 1 || 1)) * innerW;
      const yAt = v => pad.t + innerH - ((v - min) / (max - min || 1)) * innerH;
      const avgY = yAt(avgV);

      let linePath = "";
      const segments = [];
      let seg = null;
      rows.forEach((r, i) => {
        const v = r[key];
        if (v == null) { seg = null; return; }
        const x = xAt(i);
        const y = yAt(v);
        linePath += (seg ? "L" : "M") + x.toFixed(2) + "," + y.toFixed(2) + " ";
        if (!seg) { seg = []; segments.push(seg); }
        seg.push([x, y]);
      });

      const gid = "grad-" + Math.random().toString(36).slice(2, 8);
      const areas = segments.filter(s => s.length > 1).map(s => {
        const pts = s.map(p => p.join(",")).join(" ");
        return `<polygon points="${s[0][0]},${baseY} ${pts} ${s[s.length - 1][0]},${baseY}" fill="url(#${gid})" stroke="none"/>`;
      }).join("");

      const hitWidth = innerW / (n - 1 || 1) || innerW;
      const hits = rows.map((r, i) => {
        if (r[key] == null) return "";
        const x = xAt(i);
        const y = yAt(r[key]);
        return `<rect class="ts-hit" x="${(x - hitWidth / 2).toFixed(2)}" y="0" width="${hitWidth.toFixed(2)}" height="${h}" data-i="${i}" data-x="${x.toFixed(2)}" data-y="${y.toFixed(2)}"></rect>`;
      }).join("");

      const tickCount = Math.min(6, n);
      const tickIdxs = [...new Set(Array.from({ length: tickCount }, (_, k) =>
        Math.round((k / (tickCount - 1 || 1)) * (n - 1))
      ))];
      const axisTicks = tickIdxs.map(i => {
        const x = xAt(i).toFixed(2);
        return `<line x1="${x}" y1="${baseY}" x2="${x}" y2="${baseY + 4}" stroke="#c9bfa9" stroke-width="1"/>
          <text x="${x}" y="${baseY + 15}" text-anchor="middle" font-size="8" font-family="ui-monospace, Menlo, Consolas, monospace" fill="#8a8371">${formatDateAxis(rows[i].date)}</text>`;
      }).join("");

      return `<svg class="ts-chart" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" role="img">
        <defs>
          <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${color}" stop-opacity="0.22"/>
            <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <line x1="${pad.l}" y1="${avgY.toFixed(2)}" x2="${w - pad.r}" y2="${avgY.toFixed(2)}" stroke="#a49c8c" stroke-width="1" stroke-dasharray="4 3"/>
        ${areas}
        <path d="${linePath}" fill="none" stroke="${color}" stroke-width="1.5"/>
        <line x1="${pad.l}" y1="${baseY}" x2="${w - pad.r}" y2="${baseY}" stroke="#e4dccc" stroke-width="1"/>
        ${axisTicks}
        ${hits}
        <circle class="ts-dot" r="3.5" fill="${color}" stroke="#fff" stroke-width="1" style="display:none"></circle>
      </svg>
      <div class="chart-legend">
        <span class="chart-legend-item">
          <span class="chart-swatch avg"></span>
          Average (${avgV.toFixed(decimals)}${unit})
        </span>
      </div>`;
    }

    function setupTimeSeriesHover(svg, rows, key, unit) {
      const tooltip = document.getElementById("app-tooltip");
      const dot = svg.querySelector(".ts-dot");

      const moveDot = hit => {
        if (!dot) return;
        dot.setAttribute("cx", hit.dataset.x);
        dot.setAttribute("cy", hit.dataset.y);
        dot.style.display = "block";
      };

      svg.addEventListener("mouseover", e => {
        const hit = e.target.closest(".ts-hit");
        if (!hit) return;
        const row = rows[Number(hit.dataset.i)];
        const arc = arcForDate(row.date);
        const arcNote = arc ? ` (${arc.title})` : "";
        showAppTooltip(`${formatDateShort(row.date)}: ${row[key]}${unit}${arcNote}`, e);
        moveDot(hit);
      });

      svg.addEventListener("mousemove", e => {
        const hit = e.target.closest(".ts-hit");
        if (!hit) return;
        if (tooltip.style.display !== "none") placeTooltip(tooltip, e);
        moveDot(hit);
      });

      svg.addEventListener("mouseleave", () => {
        tooltip.style.display = "none";
        if (dot) dot.style.display = "none";
      });
    }

    function buildArcBarChart(arcRows) {
      const w = Math.max(640, arcRows.length * 26);
      const h = 110;
      const pad = { t: 8, r: 8, b: 8, l: 8 };
      const vals = arcRows.map(a => avg(a.tvsp));
      const max = Math.max(...vals);
      const innerW = w - pad.l - pad.r;
      const innerH = h - pad.t - pad.b;
      const bw = innerW / arcRows.length;

      const bars = arcRows.map((a, i) => {
        const v = avg(a.tvsp);
        const bh = max ? (v / max) * innerH : 0;
        const x = pad.l + i * bw;
        const y = pad.t + innerH - bh;
        const color = SEASON_CHART_COLORS[a.arc.season] || "#b7ac93";
        return `<rect class="arc-bar" x="${x + 0.5}" y="${y}" width="${Math.max(bw - 1, 0.6)}" height="${Math.max(bh, 0.6)}" fill="${color}" data-i="${i}"></rect>`;
      }).join("");

      return `<svg class="arc-bar-chart" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${bars}</svg>`;
    }

    function setupArcBarHover(svg, arcRows) {
      if (!svg) return;
      const tooltip = document.getElementById("app-tooltip");
      svg.addEventListener("mouseover", e => {
        const bar = e.target.closest(".arc-bar");
        if (!bar) return;
        const a = arcRows[Number(bar.dataset.i)];
        tooltip.innerHTML = `<b>${escapeHtml(a.arc.title)}</b> (S${a.arc.season})<br>${avg(a.tvsp).toFixed(2)}M viewers avg<br>${fmtPct(avgOrNull(a.pda))} share avg<br>${a.tvsp.length} broadcasts`;
        tooltip.style.display = "block";
        placeTooltip(tooltip, e);
      });
      svg.addEventListener("mousemove", e => {
        if (tooltip.style.display !== "none" && e.target.closest(".arc-bar")) placeTooltip(tooltip, e);
      });
      svg.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });
    }

    function renderViewership() {
      const content = document.getElementById("panel-viewership");
      const rows = viewershipData?.rows || [];

      if (!rows.length) {
        content.innerHTML = '<p class="empty-state">No data.</p>';
        document.getElementById("stats").textContent = "No data";
        return;
      }

      const tvspVals = rows.map(r => r.tvsp);
      const pdaRows = rows.filter(r => r.pda != null);
      const pdaVals = pdaRows.map(r => r.pda);

      const peakTvspIdx = tvspVals.indexOf(Math.max(...tvspVals));
      const peakPdaIdx = pdaVals.length ? pdaVals.indexOf(Math.max(...pdaVals)) : -1;
      const latest = rows[rows.length - 1];

      const arcStats = new Map();
      rows.forEach(r => {
        const arc = arcForDate(r.date);
        if (!arc) return;
        if (!arcStats.has(arc.num)) arcStats.set(arc.num, { arc, tvsp: [], pda: [] });
        arcStats.get(arc.num).tvsp.push(r.tvsp);
        if (r.pda != null) arcStats.get(arc.num).pda.push(r.pda);
      });
      const arcRows = [...arcStats.values()].sort((a, b) => a.arc.num - b.arc.num);

      const tvspChart = buildTimeSeriesChart(rows, "tvsp", SKY_BLUE, "M", 2);
      const pdaChart = buildTimeSeriesChart(rows, "pda", "#7d2a3d", "%", 1);
      const arcBar = buildArcBarChart(arcRows);

      content.innerHTML = `
        <div class="info-box">
          <span class="bulb">💡</span>
          <span><b>tvsp</b> (téléspectateurs) is the estimated number of viewers, in millions. <b>pda</b> (part d'audience) is the overall audience share: the percentage of everyone watching TV at that moment, across all channels, who were watching this show. Some source articles report a demographic-specific share instead of the overall figure on a given day, most often <b>FRDA-50</b> (women under 50 who are the household's primary shopper), occasionally 15–24-year-olds. Those aren't the same metric as overall pda, so they're excluded here rather than mixed in: an "N/A" on some dates means no overall pda was reported that day, not zero. Source: <a href="https://www.mediametrie.fr/fr/les-mots-des-medias" target="_blank" rel="noopener">Médiamétrie</a>.</span>
        </div>

        <section>
          <h2>Ratings overview</h2>
